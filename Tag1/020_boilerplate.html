<!DOCTYPE html>
<!--Der Doctype sagt dem Browser: "Das ist eine HTML-Seite!"-->

<html lang="de">
<!-- <html> ist das Wurzelelement der Seite
        Wurzelelement = das oberste HTML-Element, das ALLE anderen Elemente umschließt.
        Also alles was zur Webseite gehört (<head>. <body>, Inhalte etc.) liegen innerhalb dieses <html> Tags.
        Typische Sprachcodes:
        de = deutsch
        en = Englisch
        fr = Französisch
        es = Spanisch
        etc.    -->

        <head>
        <!-- <head> enthält die Metadaten = Infos über die Seite, die NICHT sichtbar sind.-->

            <meta charset="UTF-8">
            <!-- Legt die Zeichencodierung fest
                UTF-8 -> Umlaute und Sonderzeichen können korrekt angezeigt werden (ä,ö,ü,ß,€ etc.)-->

            
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <!-- Sorgt dafür, dass die Seite auf dem Handy und Tablet richtig skaliert wird (= Responsive Design),
                name="viewporrt" -> diese Einstellung betrifft den sichbaren Bereich unserer Webseite, welche wir auf unserem Gerät anschauen
                width=device-width -> Die Breite der Seite soll sich an der Breite des Gerätes anpassen.
                initial-scale=1.0 -> Die Anfangs Zoomstufe
                1.0 = 100% Zoom (Standradgröße)
                0.5 = bedeutet 50% Zoom (alles kleiner)
                2.0 = bedeutet 200% Zoom (alles größer) -> NICHT empfehlen-->
            
            <title>Boilerplate</title>
            <!--Titel der Seite
                -> erscheint im Browser Tab und natürich bei Google in den Suchergebnissen-->

        </head>
        
        <body>
        <!--<body> enthält alles was auf der Webseite sichtbar ist-->    

            <header>
                <!-- Kopfbereich der Seite und der enthält z.B: Logo, Überschrift, Navigation, Login, Anmeldung-->

                <h1> Hallo HTML!</h1>
                <!-- <h1> ist eine Überschrift
                        -> Überschrift der ersten Ordnung (wichtigste Überschrift) und darf nur EINMAL pro Seite benutzt werden-->

            </header>

            <main>
                <!-- Das ist der Hauptteil der Seite
                    -> Typische Inhalte: Texte, Artikel, Bilder, Inhalte welche die Themen der Seite erklären sollen.-->
                
                    <p>Hier beginnt eure eigentliche Webseite (Alles was ihr an Inhalten habt)!</p>
                    <!-- <p> steht für Paragraph = Absatz-->

            </main>

            <footer>
            <!-- Das ist der Fußbereich, und der enthält z.B.: Copyright, Links, Kontakte etc.-->

                <p>&copy; 2026 Andreas Burry</p> 
                <!--&copy; steht für das Copyright-Zeichen   
                    HTML versteht manche Zeichen nicht direkt oder sie können Probleme machen. Dehalb gibt es Enteties (Ersatzschreibweisen).--> 
                
                    
            </footer>
        </body>

</html>
